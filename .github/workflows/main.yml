name: Auto Status Update

on:
  create:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  # feature/id-name или hotfix/id-name → In Progress
  branch-to-progress:
    if: github.event_name == 'create' && github.ref_type == 'branch' && (startsWith(github.ref_name, 'feature/') || startsWith(github.ref_name, 'hotfix/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get issue from branch
        id: issue
        uses: ./.github/actions/get-issue
        with:
          github-token: ${{ secrets.ORG_PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          branch-name: ${{ github.ref_name }}
      
      - name: Reopen issue if closed (for hotfix)
        if: steps.issue.outputs.issue-number != '' && startsWith(github.ref_name, 'hotfix/')
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github-token: ${{ secrets.ORG_PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.issue.outputs.issue-number }}
            });
            
            if (issue.data.state === 'closed') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ steps.issue.outputs.issue-number }},
                state: 'open'
              });
              console.log(`Reopened issue #${{ steps.issue.outputs.issue-number }} for hotfix`);
            }
      
      - name: Update status to In Progress
        if: steps.issue.outputs.issue-number != ''
        uses: leonsteinhaeuser/project-beta-automations@v2.2.1
        with:
          gh_token: ${{ secrets.ORG_PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          organization: triloq-notes
          project_id: 3
          resource_node_id: ${{ steps.issue.outputs.issue-node-id }}
          status_value: "In Progress"

  # PR opened/reopened to dev → In review & QA
  pr-to-review:
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'ready_for_review') && github.event.pull_request.base.ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get issue from PR
        id: issue
        uses: ./.github/actions/get-issue
        with:
          github-token: ${{ secrets.ORG_PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          pr-title: ${{ github.event.pull_request.title }}
          pr-body: ${{ github.event.pull_request.body }}
          branch-name: ${{ github.event.pull_request.head.ref }}
      
      - name: Update status to In Review & QA
        if: steps.issue.outputs.issue-number != ''
        uses: leonsteinhaeuser/project-beta-automations@v2.2.1
        with:
          gh_token: ${{ secrets.ORG_PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          organization: triloq-notes
          project_id: 3
          resource_node_id: ${{ steps.issue.outputs.issue-node-id }}
          status_value: "In Review & QA"

  # PR rejected → In Progress
  pr-rejected-to-progress:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get issue from PR
        id: issue
        uses: ./.github/actions/get-issue
        with:
          github-token: ${{ secrets.ORG_PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          pr-title: ${{ github.event.pull_request.title }}
          pr-body: ${{ github.event.pull_request.body }}
          branch-name: ${{ github.event.pull_request.head.ref }}
      
      - name: Update status to In Progress
        if: steps.issue.outputs.issue-number != ''
        uses: leonsteinhaeuser/project-beta-automations@v2.2.1
        with:
          gh_token: ${{ secrets.ORG_PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          organization: triloq-notes
          project_id: 3
          resource_node_id: ${{ steps.issue.outputs.issue-node-id }}
          status_value: "In Progress"

  # PR merged to dev → Release Candidate
  merge-to-rc:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get issue from PR
        id: issue
        uses: ./.github/actions/get-issue
        with:
          github-token: ${{ secrets.ORG_PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          pr-title: ${{ github.event.pull_request.title }}
          pr-body: ${{ github.event.pull_request.body }}
          branch-name: ${{ github.event.pull_request.head.ref }}
      
      - name: Update status to Release Candidate
        if: steps.issue.outputs.issue-number != ''
        uses: leonsteinhaeuser/project-beta-automations@v2.2.1
        with:
          gh_token: ${{ secrets.ORG_PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          organization: triloq-notes
          project_id: 3
          resource_node_id: ${{ steps.issue.outputs.issue-node-id }}
          status_value: "Release Candidate"

  # PR merged from dev to main → Done (close all RC issues)
  release-to-done:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get all Release Candidate issues and move to Done
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github-token: ${{ secrets.ORG_PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const org = 'triloq-notes';
            const projectNumber = 3;
            
            // Get project and field info
            const projectQuery = `
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                    items(first: 100) {
                      nodes {
                        id
                        fieldValues(first: 10) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field {
                                ... on ProjectV2SingleSelectField {
                                  name
                                }
                              }
                            }
                          }
                        }
                        content {
                          ... on Issue {
                            id
                            number
                            title
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            const result = await github.graphql(projectQuery, { org, number: projectNumber });
            const project = result.organization.projectV2;
            
            // Find Status field and Done option
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            if (!statusField) {
              console.log('Status field not found');
              return;
            }
            
            const doneOption = statusField.options.find(o => o.name === 'Done');
            if (!doneOption) {
              console.log('Done option not found');
              return;
            }
            
            // Find all items with Release Candidate status
            const rcItems = project.items.nodes.filter(item => {
              const statusValue = item.fieldValues.nodes.find(
                fv => fv.field?.name === 'Status' && fv.name === 'Release Candidate'
              );
              return statusValue && item.content;
            });
            
            console.log(`Found ${rcItems.length} Release Candidate issue(s)`);
            
            // Update each item to Done and close the issue
            for (const item of rcItems) {
              const issueNumber = item.content.number;
              
              // Update project status to Done
              const updateMutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }
                  ) {
                    projectV2Item { id }
                  }
                }
              `;
              
              await github.graphql(updateMutation, {
                projectId: project.id,
                itemId: item.id,
                fieldId: statusField.id,
                optionId: doneOption.id
              });
              
              // Close the issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
                state_reason: 'completed'
              });
              
              console.log(`✅ Issue #${issueNumber} (${item.content.title}) → Done`);
            }
